apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: {{ .Release.Name }}-grafana-route
  namespace: monitoring
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`{{ .Values.grafana.domain }}`)
      kind: Rule
      services:
        - name: {{ .Release.Name }}-grafana
          port: {{ .Values.grafana.port }}

