apiVersion: apps/v1
kind: Deployment
metadata:
  name: python-app
  namespace: dev 
spec:
  replicas: 2
  selector:
    matchLabels:
      app: python-app # 1. O seletor busca essa label
  template:
    metadata:
      labels:
        app: python-app # 2. O pod recebe essa label
    spec:
      imagePullSecrets:
      - name: github-registry-secret
      containers: # 3. Bloco movido para a raiz de spec
      - name: python-app
        image: 192.168.15.210:5000/app-homelab-python:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 5000
---
apiVersion: v1
kind: Service
metadata:
  name: python-app-service
  namespace: dev 
spec:
  type: NodePort
  ports:
  - port: 80
    targetPort: 5000
    nodePort: 30080
  selector:
    app: python-app # 4. O serviço se conecta aos pods com essa label exata
